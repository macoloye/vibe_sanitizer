<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgA" x1="90" y1="60" x2="1210" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111D"/>
      <stop offset="1" stop-color="#10253A"/>
    </linearGradient>
    <style>
      .title { font: 700 64px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F5F8FC; }
      .sub { font: 400 24px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #B8C8DB; }
      .mono { font: 600 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #EAF1FA; }
      .mono-dim { font: 500 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #ABC0D8; }
      .pill { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>
  <rect width="1280" height="640" fill="url(#bgA)"/>
  <circle cx="1090" cy="96" r="120" fill="#1E90FF" fill-opacity="0.12"/>
  <circle cx="183" cy="550" r="170" fill="#0E3E64" fill-opacity="0.22"/>

  <text x="96" y="120" class="title">vibe_sanitizer</text>
  <text x="96" y="160" class="sub">Scan the right Git scope, clean up safe findings, export a shareable copy.</text>

  <rect x="92" y="214" width="1094" height="316" rx="28" fill="#0D1625" stroke="#263B57"/>
  <text x="132" y="270" class="mono">vibe_sanitizer scan --scope staged</text>
  <text x="132" y="304" class="mono-dim">Detect sensitive data before commit without printing raw secrets.</text>

  <rect x="132" y="344" width="86" height="30" rx="15" fill="#4D1116"/>
  <text x="151" y="364" class="pill" fill="#FF7B72">HIGH</text>
  <text x="240" y="364" class="mono-dim">openai_key</text>
  <text x="402" y="364" class="mono-dim">app.py:12</text>
  <text x="520" y="364" class="mono">sk-***3456</text>

  <rect x="132" y="394" width="110" height="30" rx="15" fill="#5E4510"/>
  <text x="148" y="414" class="pill" fill="#FFD866">MEDIUM</text>
  <text x="264" y="414" class="mono-dim">home_path</text>
  <text x="402" y="414" class="mono-dim">README.md:43</text>
  <text x="570" y="414" class="mono">/Users/.../secrets.txt</text>

  <rect x="760" y="318" width="372" height="150" rx="20" fill="#101F33" stroke="#29425F"/>
  <text x="790" y="356" class="mono">sanitize --mode in-place</text>
  <text x="790" y="388" class="mono-dim">Fix only safe findings in the real repo.</text>
  <text x="790" y="430" class="mono">export --output ../safe-share</text>
  <text x="790" y="462" class="mono-dim">Create a separate repo copy for sharing.</text>

  <text x="96" y="584" class="sub">Built for local repos, staged changes, and AI-assisted coding workflows.</text>
</svg>
